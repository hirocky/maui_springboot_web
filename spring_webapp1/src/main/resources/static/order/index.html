<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>注文画面 / POS デモ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/order/style.css">
</head>
<body>
<div class="app">
    <header class="app-header">
        <div class="app-title">
            <span class="app-title-main">KAITSU CAFE</span>
            <span class="app-title-sub">注文 POS デモ</span>
        </div>
        <div class="app-status">
            <div class="status-item">
                <span class="status-label">オーダー番号</span>
                <span id="order-number" class="status-value">0001</span>
            </div>
            <div class="status-item">
                <span class="status-label">担当</span>
                <span class="status-value">STAFF-01</span>
            </div>
        </div>
    </header>

    <main class="app-main">
        <aside class="sidebar">
            <h2 class="sidebar-title">カテゴリ</h2>
            <div id="category-list" class="category-list">
                <!-- JS でカテゴリボタンを挿入 -->
            </div>
        </aside>

        <section class="menu-area">
            <div class="menu-header">
                <h2 id="current-category-label">すべての商品</h2>
                <input id="search-input" class="search-input" type="search" placeholder="商品名で検索">
            </div>
            <div id="menu-grid" class="menu-grid">
                <!-- JS でメニューを挿入 -->
            </div>
        </section>

        <section class="order-area">
            <div class="order-header">
                <h2>注文一覧</h2>
                <button id="clear-order-btn" class="btn ghost small">全てクリア</button>
            </div>

            <div class="order-list-wrapper">
                <table class="order-table">
                    <thead>
                    <tr>
                        <th>商品</th>
                        <th>数量</th>
                        <th>単価</th>
                        <th>小計</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody id="order-items">
                    <!-- JS で注文行を挿入 -->
                    </tbody>
                </table>
                <div id="order-empty" class="order-empty">
                    商品をタップして注文に追加してください。
                </div>
            </div>

            <div class="order-summary">
                <div class="summary-row">
                    <span>小計</span>
                    <span id="summary-subtotal" class="summary-value">¥0</span>
                </div>
                <div class="summary-row">
                    <span>税額 (10%)</span>
                    <span id="summary-tax" class="summary-value">¥0</span>
                </div>
                <div class="summary-row total-row">
                    <span>合計</span>
                    <span id="summary-total" class="summary-value">¥0</span>
                </div>
            </div>

            <div class="order-actions">
                <button class="btn accent large" id="btn-order">注文</button>
            </div>
        </section>
    </main>
</div>


<div id="toast" class="toast hidden"></div>

<script src="/order/app.js"></script>
</body>
</html>
