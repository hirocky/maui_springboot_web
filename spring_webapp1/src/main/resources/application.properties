server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/appdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo&characterEncoding=utf8
spring.datasource.username=appuser
spring.datasource.password=apppass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Windows/IDE ターミナルでの日本語ログ文字化けを防ぐ
logging.charset.console=UTF-8

# レシートプリンター（Infrastructure が参照する固定値）
receipt.printer.windows-name=EPSON TM-T88V Receipt

# レシートの印字幅調整（mm）
receipt.printer.paper-width-mm=80
receipt.printer.side-margin-mm=2
